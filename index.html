<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YN Global</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo-area">
    <img id="mainLogo" src="https://via.placeholder.com/50" class="logo">
    <h1>YN GLOBAL</h1>
  </div>
  <div class="hamburger" onclick="toggleMenu()">☰</div>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidebar" class="sidebar">
  <h3>Menu</h3>
  <div onclick="showLayanan()">Pelayanan</div>
  <div onclick="showTentang()">Tentang Kami</div>
  <div onclick="showHubungi()">Hubungi Kami</div>
  <div onclick="editorLogin()">Login Editor</div>
  <div onclick="toggleDarkMode()">🌙 Darkness</div>
</div>

<section id="layanan" class="hidden">
  <h2>Divisi Kami</h2>
  <div id="divisi-list"></div>
</section>

<section id="detail-divisi" class="hidden"></section>

<section id="tentang" class="hidden">
  <h2>Tentang Kami</h2>
  <p>YN Global adalah holding transportasi, logistik, airline, dan maritim.</p>
</section>

<section id="hubungi" class="hidden">
  <h2>Hubungi Kami</h2>
  <p>Email: info@ynglobal.com</p>
</section>

<script src="script.js"></script>
</body>
</html>
